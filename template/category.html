{%extends 'base.html' %}

{%block title%} CATEGORY {%endblock%}

{%block content%}

<style>
    *{
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
        
    }
    body{
        background-color: #f2f2f2;
    }
</style>

<div class="container-custom">

    <h3>{{cat.title}}</h3>

    <div class="img-container">
        <img src="/media/{{cat.image}}" class="responsive-img" style="max-height:450px; width:100%; object-fit:cover; ">
    </div>

     <div class="collection">

         {%for p in posts%}

         <a href="/blog/{{p.url}}" class="collection-item">{{p.title}}</a>

         {% empty %}

         <h3>No post in this category</h3>

         {%endfor%}

      </div>


</div>

{%endblock%}
