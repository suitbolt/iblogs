{%extends 'base.html' %}

{%block title%} POST {%endblock%}

{%block content%}

<style>
    *{
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
        
    }
    body{
        background-color: #f2f2f2;
    }
</style>

<div class="container-custom">

    <div class="row">
        <div class="col s12 m10">

            <h1>{{post.title}}</h1>

            <p>( {{post.cat.title}} )</p>
            
            <img src="/media/{{post.image}}" class="responsive-img" style="height: 75vh; width: 100%;">

            <br>

            <p>
                {{post.content|safe}}
            </p>

        </div>

        <div class="col s12 m2">

             {% for cat in cats%}

        <div class="card item" style="margin-left:10px;">

            <div class="img-container">
                <img src="/media/{{cat.image}}" class="responsive-img">
            </div>

            <div class="card-content">

                <b>
                    {{cat.title}}
                </b>

                <p class="truncate">{{cat.description}}</p>

                <div class="container center-align" style="margin:20px;">
                    <a href="/category/{{cat.url}} " class="btn bg_primary">VIEW</a>
                </div>

            </div>


        </div>

        {%endfor%}

        </div>

    </div>

</div>

{%include 'com.html'%}

{%endblock%}
